# validation-run.yml — Piece 2 of the validation orchestrator: the CI runner for the AGENT/REPO
# producers the cockpit server can't run itself. Dispatched by the cockpit
# (/api/admin/pipeline/<slug>/run-full-validation) with the product slug + live URL + the
# deployment to bind verdicts to. Records to readiness_results via scripts/gate-check.mjs.
#
# Jobs:
#   2a  repo-probe   — DEFAULT, REAL: checks out the product repo, runs validation-probe.mjs
#                      (#35 email sender · #36 @caistech-first · #37 feature pre-flight) and records
#                      verdicts (source=auto). Deterministic, no browser.
#   2b  browser-agents — OPT-IN (run_agents=true), FRONTIER/SCAFFOLD: the real naive-tester +
#                      voice-auditor + dual-portal walk needs a gstack/Claude-Code browser runner,
#                      which GitHub-hosted runners don't provide. This job is intentionally a
#                      documented scaffold (it does NOT fake a shallow HTTP "naive-tester" — that
#                      is the exact anti-pattern this whole effort removes). Wire a SELF-HOSTED
#                      runner (Dennis's machine, where gstack + browse + Claude Code live) or a
#                      Playwright+vision agent here; until then it no-ops with a clear message.
#                      voice-auditor's readiness path (codes 10-21, currently unscored — "2c") is
#                      closed the moment this job records via `gate-check.mjs --source voice-auditor`.
#
# Secrets required: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY (for gate-check writes),
#                   GH_PAT (PAT to checkout the product repo).

name: validation-run

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Product slug (cockpit productId, e.g. deal-findrs)'
        required: true
      url:
        description: 'Live product URL (context for probes)'
        required: false
        default: ''
      deployment_id:
        description: 'Deployment the verdicts bind to (blank = --no-deployment)'
        required: false
        default: ''
      run_agents:
        description: 'Run the CI-native browser test-agents (naive-tester + voice-auditor)'
        required: false
        default: 'true'

jobs:
  repo-probe:
    name: 2a — repo/URL probe (real)
    runs-on: ubuntu-latest
    env:
      # gate-check.mjs reads CAIS_GATES_URL / CAIS_GATES_SERVICE_KEY from env (resolveGatesCreds);
      # the NEXT_PUBLIC_/SUPABASE_ names are kept for any script that reads them directly.
      CAIS_GATES_URL: ${{ secrets.SUPABASE_URL }}
      CAIS_GATES_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout shared-services (gate-check + validation-probe)
        uses: actions/checkout@v4
        with:
          path: shared

      - name: Checkout the product repo
        uses: actions/checkout@v4
        with:
          repository: dennissolver/${{ github.event.inputs.slug }}
          token: ${{ secrets.GH_PAT }}
          path: target
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run the repo/URL probe (records #35/#36/#37)
        run: |
          if [ ! -d target ] || [ -z "$(ls -A target 2>/dev/null)" ]; then
            echo "::warning::product repo dennissolver/${{ github.event.inputs.slug }} not checked out (token/visibility?) — skipping repo probe"
            exit 0
          fi
          node shared/scripts/validation-probe.mjs \
            --slug "${{ github.event.inputs.slug }}" \
            --repo target \
            --deployment "${{ github.event.inputs.deployment_id }}" \
            --gate-check shared/scripts/gate-check.mjs

  browser-agents:
    name: 2b — browser test-agents (CI-native Playwright + vision)
    needs: repo-probe
    if: ${{ github.event.inputs.run_agents != 'false' }}
    runs-on: ubuntu-latest
    env:
      # gate-check writes
      CAIS_GATES_URL: ${{ secrets.SUPABASE_URL }}
      CAIS_GATES_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # vision verdicts
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # user-agent (a real QA account, never a backdoor — PRODUCT_STANDARDS §9.5). QA_USER_EMAIL is
      # the canonical name (matches the products' .env.local); TEST_USER_EMAIL kept as a fallback.
      QA_USER_EMAIL: ${{ secrets.QA_USER_EMAIL }}
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      QA_USER_PASSWORD: ${{ secrets.QA_USER_PASSWORD }}
      # admin-agent — a real admin account in ADMIN_EMAILS, NEVER an operator account.
      QA_OWNER_EMAIL: ${{ secrets.QA_OWNER_EMAIL }}
      QA_ADMIN_EMAIL: ${{ secrets.QA_ADMIN_EMAIL }}
      QA_OWNER_PASSWORD: ${{ secrets.QA_OWNER_PASSWORD }}
      # preview SSO bypass (if the URL is a protected preview)
      VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
    steps:
      - name: Checkout shared-services (agents + gate-check)
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright + chromium
        run: |
          cd scripts/agents
          npm install
          npx playwright install --with-deps chromium

      - name: Guard — no ANTHROPIC_API_KEY → record nothing (degrade-don't-fake)
        if: ${{ env.ANTHROPIC_API_KEY == '' }}
        run: echo "::warning::ANTHROPIC_API_KEY not set on this repo — the vision agents record NOTHING (no fake verdicts). Add the secret to enable 2b."

      - name: naive-tester (visual/UX NAIVE checks)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          node scripts/agents/naive-tester.mjs \
            --slug "${{ github.event.inputs.slug }}" \
            --url "${{ github.event.inputs.url }}" \
            --deployment "${{ github.event.inputs.deployment_id }}"
        continue-on-error: true

      - name: voice-auditor (browser-observable voice checks)
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: |
          node scripts/agents/voice-auditor.mjs \
            --slug "${{ github.event.inputs.slug }}" \
            --url "${{ github.event.inputs.url }}" \
            --deployment "${{ github.event.inputs.deployment_id }}"
        continue-on-error: true

      - name: admin-tester (dual-portal admin checks VT_A1-A4)
        if: ${{ env.ANTHROPIC_API_KEY != '' && env.QA_OWNER_PASSWORD != '' }}
        run: |
          node scripts/agents/admin-tester.mjs \
            --slug "${{ github.event.inputs.slug }}" \
            --url "${{ github.event.inputs.url }}" \
            --deployment "${{ github.event.inputs.deployment_id }}"
        continue-on-error: true
