name: Design & Build (architect → builder)

# Stage 2 of the Product Factory, headless. Dispatched by the cockpit's /design-build/kickoff
# route (or manually from the Actions tab). Two phases:
#   1. DESIGN  — opencode reads the spec (14 validation fields) + portfolio standards +
#                cais-build-template-v2, writes design-plan.md.
#   2. BUILD   — opencode consumes design-plan.md + the template and rewrites the product on a
#                NEW BRANCH, commits, pushes, opens a PR. It never pushes to main.
# The agent runs FULL-AUTONOMOUS (no per-change prompts): where the standards answer a choice it
# just proceeds; where it hits a genuine fork the standards don't resolve, it decides by the most
# standards-aligned default AND logs that fork into the PR body (and decisions.json) for the human
# to override at review. The PR is the only human checkpoint. Its url is POSTed back to the card.
#
# design-build CUSTOMIZES an existing repo — it never creates one (provisioning owns that). Two
# framings, selected by the VERDICT input:
#   verdict=NEW (TEARDOWN/RENOVATE's sibling): the repo is a freshly-provisioned cais-starter (by
#     new-product) — customize the generic starter to the card spec. No survey failures yet.
#   verdict=TEARDOWN / RENOVATE: an existing live product — rebuild it against its recorded survey
#     findings. A brand-new product must be provisioned by new-product BEFORE design-build runs.
#
# Lives in: caistech/cais-shared-services/.github/workflows/design-build.yml (must be on default branch).
#
# Required Actions secrets (same set as survey.yml):
#   OPENCODE_AUTH_JSON, GH_PAT (contents:write + pull-requests:write on dennissolver/*),
#   COCKPIT_BASE
# Optional repo variable: DESIGN_BUILD_MODEL (this job's model; falls back to shared OPENCODE_MODEL, then Sonnet)

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Product slug (cockpit productId, e.g. deal-findrs)'
        required: true
        type: string
      verdict:
        description: 'Survey verdict that triggered this (TEARDOWN | RENOVATION)'
        required: false
        type: string
      url:
        description: 'Live product URL (context only)'
        required: false
        type: string
      model:
        description: 'OpenCode model id (blank = DESIGN_BUILD_MODEL var, else shared OPENCODE_MODEL, else Sonnet)'
        required: false
        type: string

concurrency:
  group: design-build-${{ github.event.inputs.slug }}
  cancel-in-progress: true

jobs:
  design-build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COCKPIT_BASE: ${{ secrets.COCKPIT_BASE }}
      SLUG: ${{ github.event.inputs.slug }}
      VERDICT_IN: ${{ github.event.inputs.verdict }}
      # Design-build gets its OWN model var (it's the generative job that needs a stronger model).
      # Survey/other jobs keep the cheap shared OPENCODE_MODEL — cost-per-task per §6 of the pattern doc.
      # Precedence: manual dispatch input > DESIGN_BUILD_MODEL var > shared OPENCODE_MODEL var > Sonnet default.
      OPENCODE_MODEL: ${{ github.event.inputs.model || vars.DESIGN_BUILD_MODEL || vars.OPENCODE_MODEL || 'opencode/claude-sonnet-4-6' }}
      BRANCH: design-build/${{ github.event.inputs.slug }}-${{ github.run_id }}
      # Lets npm install private @caistech/* from GitHub Packages, so the builder CONSUMES the hub
      # (e.g. @caistech/elevenlabs-convai) instead of inlining/forking its logic. GH_PAT must carry
      # read:packages scope. Read by the .npmrc written into target/ below.
      NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

    steps:
      - name: Checkout shared-services (standards + template)
        uses: actions/checkout@v4

      - name: Resolve target repo (must be provisioned first)
        id: repo
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # design-build CUSTOMIZES an existing repo — it never creates one. A brand-new product is
          # provisioned first by new-product (repo from cais-starter + Supabase + Vercel + voice +
          # deploy), which then dispatches design-build with verdict=NEW to customize the generic
          # starter to spec. So the repo MUST already exist here; a 404 means provisioning didn't run.
          set -e
          OWNER=dennissolver
          REPO="$SLUG"
          code=$(curl -sS -o /tmp/repo.json -w '%{http_code}' \
            -H "Authorization: Bearer $GH_PAT" -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$OWNER/$REPO")
          if [ "$code" != "200" ]; then
            echo "::error::repo $OWNER/$REPO not found (HTTP $code). Provision the product first (new-product), then re-run design-build — design-build no longer creates repos."
            exit 1
          fi
          # NET-NEW vs existing is the VERDICT, not repo existence: verdict=NEW = a freshly provisioned
          # cais-starter to customize to spec (no survey failures yet); TEARDOWN/RENOVATE = an existing
          # live product to fix against its recorded survey findings.
          if [ "${VERDICT_IN:-}" = "NEW" ]; then
            echo "repo $OWNER/$REPO exists; verdict=NEW — customize the freshly-provisioned starter to spec"
            echo "NET_NEW=true" >> "$GITHUB_ENV"
          else
            echo "repo $OWNER/$REPO exists; verdict=${VERDICT_IN:-TEARDOWN} — existing-repo (teardown/renovate) path"
            echo "NET_NEW=false" >> "$GITHUB_ENV"
          fi

      - name: Checkout target product repo
        uses: actions/checkout@v4
        with:
          repository: dennissolver/${{ github.event.inputs.slug }}
          token: ${{ secrets.GH_PAT }}
          path: target
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wire @caistech GitHub Packages auth into the target repo
        run: |
          # So the builder can `npm install @caistech/elevenlabs-convai` (the hub) and consume it
          # instead of inlining its logic (the forking anti-pattern). The quoted heredoc keeps
          # ${NODE_AUTH_TOKEN} LITERAL in the file; npm expands it from the env at install time.
          # NOTE: this .npmrc gets COMMITTED with the PR (git add -A), so it must carry everything the
          # product's Vercel build needs — including legacy-peer-deps, or a @caistech peer-range drift
          # (e.g. lucide-react) ERESOLVE-fails the deploy. Do NOT drop it: the gate below installs the
          # SAME way Vercel does (via this file, no CLI flags), so a missing line fails the gate, not
          # just the deploy.
          cat > "$GITHUB_WORKSPACE/target/.npmrc" <<'NPMRC'
          @caistech:registry=https://npm.pkg.github.com
          //npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}
          always-auth=true
          legacy-peer-deps=true
          NPMRC
          echo "wrote target/.npmrc (@caistech → GitHub Packages)"

      - name: Install OpenCode
        run: npm i -g opencode-ai@latest

      - name: Restore OpenCode auth
        env:
          OPENCODE_AUTH_JSON: ${{ secrets.OPENCODE_AUTH_JSON }}
        run: |
          mkdir -p ~/.local/share/opencode
          printf '%s' "$OPENCODE_AUTH_JSON" > ~/.local/share/opencode/auth.json
          test -s ~/.local/share/opencode/auth.json && echo "auth.json written ($(wc -c < ~/.local/share/opencode/auth.json) bytes)"

      - name: Stage standards + template into the working dir
        run: |
          # The agent runs in target/ and (headless) auto-rejects out-of-cwd reads, so copy the
          # standards + the build template in. _standards/ = the rules; _template/ = the skeleton.
          SS="$GITHUB_WORKSPACE"
          mkdir -p "$GITHUB_WORKSPACE/target/_standards"
          for f in PRODUCT_STANDARDS.md STYLING.md THIN_MVP_RUBRIC.md \
                   foundation/PORTFOLIO_STANDARD.md foundation/_portfolio/creator-style.md \
                   foundation/_portfolio/market-positioning.md \
                   product-factory/2-design-planning/README.md; do
            if [ -f "$SS/$f" ]; then cp "$SS/$f" "$GITHUB_WORKSPACE/target/_standards/$(basename "$f")"; fi
          done
          cp -r "$SS/templates/cais-build-template-v2" "$GITHUB_WORKSPACE/target/_template" || true
          # Inject the canonical bug-knowledge so the CHECK BUG-KNOWLEDGE rule resolves
          cp "$SS/bug-knowledge.json" "$GITHUB_WORKSPACE/target/bug-knowledge.json" || true
          echo "--- standards staged ---"; ls -la "$GITHUB_WORKSPACE/target/_standards"
          echo "--- template staged ---"; ls "$GITHUB_WORKSPACE/target/_template" || echo "(no template)"

      - name: Fetch the product spec (14 validation fields) + survey findings
        run: |
          # The card spec is the source of truth for who/what. Pull it from the cockpit so the
          # design phase targets the real distributor/end-user, not whatever the old site said.
          curl -sSL "$COCKPIT_BASE/api/admin/pipeline/$SLUG" -o "$GITHUB_WORKSPACE/target/_spec.json" || true
          echo "--- spec fetched ---"; head -c 400 "$GITHUB_WORKSPACE/target/_spec.json" || true; echo

          # Extract the survey's RECORDED FINDINGS into a binding teardown brief. The agent's job is
          # to make THESE specific failures pass — not to re-judge whether they're valid. (Run #2
          # rationalized the audience incoherence away as "no incoherence detected" and barely built,
          # because it only had the verdict, not the evidence. This file is the evidence.)
          node -e '
            const fs=require("fs");
            let p={}; try{p=JSON.parse(fs.readFileSync(process.env.GITHUB_WORKSPACE+"/target/_spec.json","utf8"));}catch(e){}
            const g=p.survey_gate||{}; const r=g.result||{};
            let out="# TEARDOWN BRIEF — the survey failures you MUST fix\n\n";
            out+="Verdict: "+(g.status||"?")+" — "+(g.reason||"")+"\n\n";
            out+="These are the survey'\''s RECORDED findings against the live build. They are GROUND TRUTH.\n";
            out+="Your job is to make every failing item below pass. Do NOT conclude the problem does not\n";
            out+="exist. Do NOT re-judge the verdict. If a field is not evidenced, the site must be changed\n";
            out+="so it IS evidenced (real copy/pages/repo content a survey can cite).\n\n";
            if(Array.isArray(r.fields)){
              out+="## Field evidence (target: >=12/14 evidenced)\n";
              for(const f of r.fields){ out+="- ["+(f.evidenced?"x":" ")+"] "+(f.label||f.field)+": "+(f.evidence||"NOT EVIDENCED — must add")+"\n"; }
              out+="\n";
            }
            if(r.preHard&&Array.isArray(r.preHard.results)){
              out+="## PRE-HARD checks (ALL must pass)\n";
              for(const c of r.preHard.results){ out+="- "+c.code+": "+c.status+(c.evidence?(" — "+c.evidence):"")+"\n"; }
              out+="\n";
            }
            if(Array.isArray(r.toReach)&&r.toReach.length){
              out+="## What the survey says must happen to reach RENOVATION\n";
              for(const t of r.toReach){ out+="- "+(t.label||t.code)+": "+(t.need||"")+"\n"; }
              out+="\n";
            }
            // Readiness punch-list — the recorded validation verdicts (naive-tester / auto-probe /
            // judge) surfaced on the card. These are ALSO binding: every fail below must be made to
            // pass, same as the survey failures. This is what the cockpit "Fix" button targets.
            if(p.score&&Array.isArray(p.score.checks)){
              const fails=p.score.checks.filter(c=>c&&c.applicable&&c.status==="fail");
              if(fails.length){
                out+="## Validation findings (readiness checks) — ALL fails MUST be made to pass\n";
                out+="Recorded test verdicts against the live build. GROUND TRUTH — do not re-judge them.\n";
                for(const c of fails){ const blk=String(c.tier||"").indexOf("HARD")>=0; out+="- ["+(blk?"BLOCKING":"lowers-score")+"] #"+c.code+" "+(c.label||"")+(c.evidence?(" — "+c.evidence):"")+"\n"; }
                out+="\n";
              }
            }
            fs.writeFileSync(process.env.GITHUB_WORKSPACE+"/target/_teardown_brief.md",out);
          ' || echo "(could not build teardown brief — spec may lack survey_gate.result)"
          echo "--- teardown brief ---"; cat "$GITHUB_WORKSPACE/target/_teardown_brief.md" 2>/dev/null || echo "(none)"

      - name: Configure OpenCode permissions (full autonomy)
        working-directory: target
        run: |
          # Full-allow: the agent must run design→build→commit without per-change prompts.
          # Safety is the branch+PR boundary (it cannot push to main), not approval prompts.
          cat > opencode.json <<'JSON'
          {
            "$schema": "https://opencode.ai/config.json",
            "permission": {
              "edit": "allow",
              "bash": "allow",
              "webfetch": "allow",
              "external_directory": "allow"
            }
          }
          JSON
          echo "--- opencode.json ---"; cat opencode.json

      - name: Build the design+build prompt
        run: |
          # NET-NEW override preamble: for a brand-new (empty) repo there is no existing site to
          # rebuild and no survey failures — redirect the agent to scaffold a fresh thin MVP, while
          # KEEPING all the shared marker/standards/no-fake/distribution rules below. The existing
          # path writes an empty preamble (byte-identical behaviour to before).
          if [ "${NET_NEW:-false}" = "true" ]; then
            {
              printf '%s\n' "NET-NEW BUILD OVERRIDE — READ FIRST. This repo is a freshly-provisioned GENERIC STARTER"
              printf '%s\n' "(cais-starter: portfolio DNA wired, but NO product content yet) — there is NO existing site"
              printf '%s\n' "to rebuild and NO survey failures / _teardown_brief to fix. IGNORE every instruction below"
              printf '%s\n' "that assumes an existing site to \"rebuild in place\" or survey failures to \"fix\" — they do"
              printf '%s\n' "not apply. INSTEAD: build out the product on top of this starter, using ./_template"
              printf '%s\n' "(cais-build-template-v2) for any patterns it lacks, targeting ./_spec.json per the THIN_MVP_RUBRIC — the FULL"
              printf '%s\n' "experience that makes the validation audience feel the promise, with ZERO scale-"
              printf '%s\n' "infrastructure (no multi-tenant / billing / dashboards / auth-backend pre-GO). Build the"
              printf '%s\n' "real product surfaces (most effort goes into BUILDING, not the plan). Everything below about"
              printf '%s\n' "the 14 survey markers, _standards, no-fake forms, the distribution loop, and PHASE 2 STILL"
              printf '%s\n\n' "APPLIES — only the \"fix survey failures / rebuild in place\" framing is replaced by this build."
            } > "$GITHUB_WORKSPACE/prompt.txt"
          else
            : > "$GITHUB_WORKSPACE/prompt.txt"
          fi
          {
            printf 'You are the Product Factory architect+builder for "%s". Verdict that triggered this: %s.\n\n' "$SLUG" "${VERDICT_IN:-TEARDOWN}"
            printf 'You are running FULLY AUTONOMOUS. Do NOT stop to ask permission for ordinary work.\n'
            printf 'Where the standards/guidelines answer a choice, just follow them. Only when you hit a\n'
            printf 'genuine fork the standards do NOT resolve, pick the most standards-aligned option,\n'
            printf 'PROCEED, and append that fork to ./decisions.json as {"question","chose","why"} so the\n'
            printf 'human can override it at PR review. Never block; the PR is the only checkpoint.\n\n'
            printf 'INPUTS in this directory:\n'
            printf '  ./_teardown_brief.md - THE BINDING WORK ORDER. The survey'\''s recorded failures against\n'
            printf '                      the live build. This is GROUND TRUTH. Every unevidenced field and\n'
            printf '                      failed PRE-HARD check listed here MUST be made to pass. You MAY NOT\n'
            printf '                      decide a listed problem does not exist or re-judge the verdict.\n'
            printf '  ./_spec.json      - the product card: the 14 validation fields (promise, friction,\n'
            printf '                      core_mechanism, distributor, end_user, the ICP fields, etc).\n'
            printf '                      This is the source of truth for WHO this is for.\n'
            printf '  ./_standards/     - PRODUCT_STANDARDS, STYLING, PORTFOLIO_STANDARD, creator-style,\n'
            printf '                      market-positioning, the THIN_MVP rubric, the Stage-2 README.\n'
            printf '  ./_template/      - cais-build-template-v2: the Next.js skeleton + CLAUDE.md to build from.\n'
            printf '  (the rest of this directory is the EXISTING %s repo - rebuild it in place.)\n\n' "$SLUG"
            printf 'PHASE 1 - DESIGN: FIRST read ./_teardown_brief.md, then read every file in ./_standards in\n'
            printf '  full (PRODUCT_STANDARDS.md, STYLING.md, PORTFOLIO_STANDARD.md, THIN_MVP_RUBRIC.md, the\n'
            printf '  Stage-2 README) and _template/CLAUDE.md, then _spec.json. In ./design-plan.md write:\n'
            printf '  (a) a "Survey failures I am fixing" section that copies each failing item from the\n'
            printf '      teardown brief and states the CONCRETE change (which file, what copy/page/route)\n'
            printf '      that will make it evidenced. Every failing item must have a fix. You may NOT write\n'
            printf '      "no incoherence detected" or otherwise dismiss a listed failure — if the brief says\n'
            printf '      the audience is contradictory, you MUST pick ONE audience and rewrite the conflicting\n'
            printf '      copy so a survey can cite a single coherent archetype + a named distributor.\n'
            printf '  (b) a "Standards I must satisfy" section listing each hard rule (by id, e.g. R3/R9/R11)\n'
            printf '      and how the build meets it. Do NOT broaden a rule beyond its stated scope.\n\n'
            printf 'HARD RULES (non-negotiable - a PR violating these will be rejected):\n'
            printf '  * FIX THE SURVEY FAILURES. The deliverable is CODE that makes the teardown-brief items\n'
            printf '    pass, not a plan. A run that only writes design-plan.md and adds a page or two has\n'
            printf '    FAILED. Expect to edit the landing/marketing copy, page content, and repo so the\n'
            printf '    unevidenced fields become evidenced. Most of your effort goes into BUILDING.\n'
            printf '  * NO FAKE / STUB SUBMISSIONS. Any form (contact, signup, demo, waitlist) MUST POST to a\n'
            printf '    real server endpoint/route. NEVER fake success with a setTimeout then a "received"\n'
            printf '    message - that silently drops user data. If no backend exists for it, either wire a\n'
            printf '    real route handler or do not show a success state that claims the data was received.\n'
            printf '  * VENDOR IDENTITY VIA ENV, NEVER HARDCODED. Do not bake email, phone, company name, HQ,\n'
            printf '    or any vendor/contact identity into source/JSX. Read them from the existing\n'
            printf '    config/env path (per the PORTFOLIO_STANDARD vendor-identity rule, R11).\n'
            printf '  * RESPECT EXACT RULE SCOPE. Apply each standard exactly as scoped in _standards - do not\n'
            printf '    broaden it.\n'
            printf '  * SUPABASE NEW-TABLE TYPING. If you add a NEW table (a migration) and then insert/select\n'
            printf '    against it via the supabase-js client, the generated Database types will NOT know the\n'
            printf '    table yet and TypeScript will type it as `never`, FAILING the build (e.g. "Argument of\n'
            printf '    type {...} is not assignable to parameter of type never"). FIX: cast the PAYLOAD on the\n'
            printf '    call, e.g. `.insert({ name, email } as never)` (or `.update(... as never)`). Do this for\n'
            printf '    every insert/update on a table you added in THIS PR. Do NOT try to fix it by typing the\n'
            printf '    client as createClient<any>(...) - that conflicts with the declared client variable type\n'
            printf '    and fails with a different error. Cast the payload, not the client. The production build\n'
            printf '    runs tsc - a never-typed insert WILL fail it.\n'
            printf '  * DISTINCT DISTRIBUTOR SURFACE. This pipeline is a DISTRIBUTOR model: the distributor is a\n'
            printf '    channel partner who RESELLS the product to its own client base - NOT the end user, and\n'
            printf '    NOT the same as the buying firm using it internally. If _spec.json names a distributor\n'
            printf '    (Distributor ICP / Distributor Outcomes) distinct from the end user, the site MUST have a\n'
            printf '    SEPARATE partner/reseller surface (e.g. a "For Partners" or "Become a Reseller" section\n'
            printf '    or page) that sells the channel economics (revenue share, white-label, resell-to-clients)\n'
            printf '    to the distributor - kept VISUALLY and STRUCTURALLY distinct from the end-user/customer\n'
            printf '    sections. Do NOT collapse the distributor into the customer section. The survey checks for\n'
            printf '    a named distributor archetype + distributor outcomes as their own evidenced thing.\n'
            printf '  * PLANT SURVEY MARKERS — ALL 14, FROM THE CARD, VIA THE HELPER. The survey gate is now\n'
            printf '    deterministic: it greps machine-checkable data-* markers off the live DOM (it no longer\n'
            printf '    reads your copy with an LLM). For EACH of the 14 spec fields you MUST plant its marker by\n'
            printf '    spreading the helper onto the element that renders that field`s visible copy:\n'
            printf '        import { markerProps, surveyManifest } from "@/lib/surveyMarkers";\n'
            printf '        <section {...markerProps("icp_partner_type", card.icp_partner_type)}> ...copy... </section>\n'
            printf '    The marker VALUE comes from the SAME card field that writes the visible copy, so the two\n'
            printf '    cannot drift. NEVER hand-write a data-* attribute; always go through markerProps so the\n'
            printf '    value is validated. The 14 fields: promise, friction, core_mechanism, icp_geography,\n'
            printf '    icp_partner_type, icp_buyer_title, icp_verticals, icp_company_size, icp_stage, exclusions,\n'
            printf '    distributor, distributor_outcomes, end_user, end_user_outcomes. PLUS plant why_now\n'
            printf '    (markerProps("why_now", ...)) on the "why this, why now" statement — the survey needs it for P3.\n'
            printf '  * NAMED MARKERS TAKE THE ARCHETYPE, NOT THE CATEGORY. icp_partner_type, icp_buyer_title,\n'
            printf '    icp_verticals, distributor, and end_user must carry the NAMED archetype from the card\n'
            printf '    (e.g. "buyers agent firm"), never a generic category ("reseller", "SMBs", "businesses",\n'
            printf '    "users"). markerProps THROWS at build on a generic value — a generic marker fails `next\n'
            printf '    build`, so you cannot ship one. icp_stage must be one of: seed | growth | scale |\n'
            printf '    operating-business | enterprise. This is the same standard as the DISTINCT DISTRIBUTOR rule,\n'
            printf '    now enforced mechanically.\n'
            printf '  * CORE_MECHANISM MARKER GOES ON THE LIVE WORKING SURFACE. Plant data-core-mechanism on the\n'
            printf '    actual functional component/section users interact with (the assessment pipeline, the\n'
            printf '    generator, etc.) — not on a tagline. It must prove the mechanism SHIPPED, not that it is\n'
            printf '    described. (This replaces the old repo path:line evidence — the survey greps DOM only now.)\n'
            printf '  * EMIT public/survey-manifest.json. The survey fetches this FIRST to learn which routes carry\n'
            printf '    markers, then greps the union of their DOM. Write it with the helper:\n'
            printf '        fs.writeFileSync("public/survey-manifest.json", surveyManifest(["/","/partners","/reports"]))\n'
            printf '    List EVERY route that carries a marker (home + the partner/reseller surface + any feature\n'
            printf '    pages). A marker on a route NOT in the manifest is invisible to the survey — that is how the\n'
            printf '    old harness missed /partners. Do NOT list anchor links (#pricing is not a route). Every listed\n'
            printf '    route must return HTTP 200.\n'
            printf '  * LUCIDE ICONS MUST EXIST IN THE INSTALLED VERSION. Before importing any icon from\n'
            printf '    lucide-react, check the version in package.json and only use icon names that exist in\n'
            printf '    THAT version. Newer icons (e.g. Handshake) are NOT in older versions (e.g. 0.383.0) and\n'
            printf '    will FAIL the build with "has no exported member". When unsure, use a common, long-stable\n'
            printf '    icon (Users, Building2, ArrowRight, CheckCircle, TrendingUp, etc.) rather than a niche one.\n'
            printf '  * DISTRIBUTION LOOP REQUIRED. Every build MUST include a distribution loop: a share or\n'
            printf '    referral surface that turns a product OUTPUT into an acquisition path (e.g. a shareable\n'
            printf '    report/result with attribution, an invite/referral affordance, or a public artifact that\n'
            printf '    links back). This is node 7 of the model (the channel) and the GTM auditor checks for it —\n'
            printf '    a build with no distribution loop FAILS GTM. Build one appropriate to THIS product; do not\n'
            printf '    stub it (a dead Share button that does nothing is a fake submission, see the no-fake rule).\n'
            printf '  * LIVE-STATE ROUTES NEED CACHE-BUSTING EXPORTS. If you write or edit a Next.js App Router\n'
            printf '    route (app/api/.../route.ts) that reads live DB/ledger state and must reflect changes\n'
            printf '    immediately, add at the TOP of the file (after imports): export const dynamic =\n'
            printf "    'force-dynamic'; export const revalidate = 0; export const fetchCache = 'force-no-store';\n"
            printf '    A Cache-Control: no-store response header is NOT enough - Next caches server-side fetches\n'
            printf '    (Supabase uses fetch) and serves a stale row without these. fetchCache=force-no-store is\n'
            printf '    the decisive one. (Root cause of the recurring "card never updates" bug.)\n'
            printf '  * CHECK BUG-KNOWLEDGE FIRST. If you hit a build/runtime error, grep the repo'"'"'s\n'
            printf '    bug-knowledge.json for the error pattern before improvising - matching entries carry the\n'
            printf '    known fix. Do not re-derive a solved problem.\n\n'
            printf 'PHASE 2 - BUILD: implement design-plan.md against the existing repo, conforming to _template\n'
            printf '  and _standards and the HARD RULES above. Keep it compiling (the PR runs lint + a\n'
            printf '  portfolio-gate audit + an AI review; aim to pass them). Then STOP - do not git push, do\n'
            printf '  not open a PR, do not run curl. The workflow handles git + PR. Remove ./_spec.json,\n'
            printf '  ./_teardown_brief.md, ./_standards, ./_template, ./opencode.json from the working tree\n'
            printf '  before finishing so they are not committed (keep ./design-plan.md and ./decisions.json).\n'
          } >> "$GITHUB_WORKSPACE/prompt.txt"
          echo "--- prompt ---"; cat "$GITHUB_WORKSPACE/prompt.txt"

      - name: Run design+build (OpenCode, headless, autonomous)
        working-directory: target
        timeout-minutes: 20
        run: |
          MODEL_FLAG=""
          if [ -n "$OPENCODE_MODEL" ]; then MODEL_FLAG="-m $OPENCODE_MODEL"; fi
          echo "=== cwd: $(pwd) ==="
          opencode run $MODEL_FLAG "$(cat "$GITHUB_WORKSPACE/prompt.txt")" 2>&1 | tee "$GITHUB_WORKSPACE/opencode-output.txt"
          echo "=== files after run ==="; git status --porcelain | head -50

      - name: Typecheck gate — build MUST compile before a PR (self-fix loop)
        working-directory: target
        timeout-minutes: 20
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # The model REASONS about code but won't catch a type error it never RAN. This gate makes
          # `tsc --noEmit` the hard contract: install deps (tolerate the known peer-range drift), run
          # tsc, and if it fails, feed the errors back to the builder (Claude via OpenCode) to fix —
          # loop up to 3×. If still broken, FAIL the job: never open a PR over non-compiling code.
          set +e
          # Scrub the staged helper dirs BEFORE typechecking. _template (cais-build-template-v2) and
          # _standards import packages NOT installed in the product (e.g. @caistech/corporate-components),
          # so tsc throws spurious, UNFIXABLE errors on them that doom the self-fix loop (ExecutorAI run
          # 2026-06-09: the gate failed only on _template/* errors). The agent is told to remove them but
          # may not — don't depend on it. KEEP opencode.json (the self-fix opencode calls need it; the
          # commit step removes it after).
          rm -rf _standards _template _spec.json _teardown_brief.md bug-knowledge.json 2>/dev/null || true
          MODEL_FLAG=""; [ -n "$OPENCODE_MODEL" ] && MODEL_FLAG="-m $OPENCODE_MODEL"
          # Install EXACTLY as Vercel does — via the committed .npmrc, NO extra CLI flags. Passing
          # --legacy-peer-deps here would mask a .npmrc that's missing it (the gate would pass while
          # the deploy ERESOLVE-fails). The .npmrc above carries legacy-peer-deps, so this resolves.
          echo "::group::npm install"; npm install --no-audit --no-fund 2>&1 | tail -25; echo "::endgroup::"
          MAX=3
          for i in $(seq 1 $MAX); do
            echo "::group::typecheck attempt $i/$MAX"
            npx --yes tsc --noEmit > /tmp/tsc.log 2>&1; code=$?
            tail -50 /tmp/tsc.log
            echo "::endgroup::"
            if [ $code -eq 0 ]; then echo "✓ TYPECHECK PASSED (attempt $i)"; exit 0; fi
            [ $i -ge $MAX ] && break
            echo "::warning::typecheck failed (attempt $i) — feeding errors back to the builder"
            ERRS=$(grep -E "error TS|: error|\.tsx?:[0-9]" /tmp/tsc.log | head -40)
            opencode run $MODEL_FLAG "The product fails \`npx tsc --noEmit\`. Fix ALL of these TypeScript errors so it compiles cleanly. Change ONLY what is required; do not touch unrelated code or features. Errors:
          $ERRS" 2>&1 | tail -15
          done
          echo "::error::typecheck still failing after $MAX attempts — refusing to open a PR over non-compiling code"
          exit 1

      - name: Commit + push branch, open PR
        id: pr
        working-directory: target
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e
          # Scrub helper files in case the agent didn't.
          rm -rf _standards _template _spec.json _teardown_brief.md opencode.json decisions.json.bak bug-knowledge.json 2>/dev/null || true

          git config user.name  "cais-design-build[bot]"
          git config user.email "design-build@corporateaisolutions.com"
          # Branch from FRESH remote main so the agent's base is never stale (avoids the
          # rejected-push drift that bites local clones). The work is already in the working tree;
          # create the branch at current HEAD but ensure origin/main is fetched for an up-to-date base.
          git fetch origin main --quiet || true
          git checkout -b "$BRANCH"

          # Stash decisions.json contents for the PR body, then remove it from the commit.
          DECISIONS_MD=""
          if [ -f decisions.json ]; then
            DECISIONS_MD=$(node -e "try{const d=JSON.parse(require('fs').readFileSync('decisions.json','utf8'));if(Array.isArray(d)&&d.length){console.log('\n## Decisions I made (override at will)\n');for(const x of d){console.log('- **'+(x.question||'?')+'** → chose _'+(x.chose||'?')+'_ — '+(x.why||''));}}}catch(e){}" )
            rm -f decisions.json
          fi

          git add -A
          if git diff --cached --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "::warning::agent produced no changes"
            exit 0
          fi
          git commit -m "Design & Build: rebuild $SLUG to spec ($VERDICT_IN)"
          # Push is the load-bearing step: a rejected push must NOT pass as a silent no-PR run.
          if ! git push -u origin "$BRANCH" 2>&1 | tee /tmp/push.log; then
            echo "push_failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::branch push failed — see log above"
            exit 1
          fi

          # Open the PR via the API. Build the JSON body entirely in node (reading via env) so
          # no shell quoting touches the title/body text.
          export PR_BODY="Automated Stage-2 Design & Build for ${SLUG} (verdict: ${VERDICT_IN}). Rebuilt to the card spec + portfolio standards + cais-build-template-v2. Review the diff, then merge to deploy.${DECISIONS_MD}"
          node -e "const fs=require('fs');fs.writeFileSync('pr.json',JSON.stringify({title:'Design & Build: '+process.env.SLUG+' ('+(process.env.VERDICT_IN||'rebuild')+')',head:process.env.BRANCH,base:'main',body:process.env.PR_BODY}))"
          PR_JSON=$(curl -sS -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/dennissolver/$SLUG/pulls" \
            --data-binary @pr.json)
          rm -f pr.json
          PR_URL=$(printf '%s' "$PR_JSON" | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{process.stdout.write(JSON.parse(s).html_url||'')}catch{process.stdout.write('')}})")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "PR: ${PR_URL:-<none — check response>}"
          printf '%s' "$PR_JSON" | head -c 300

      - name: POST result back to cockpit
        if: always()
        env:
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          NO_CHANGES: ${{ steps.pr.outputs.no_changes }}
        run: |
          if [ "$NO_CHANGES" = "true" ]; then
            export STATUS="fail"; export SUMMARY="agent produced no changes"
          elif [ -n "$PR_URL" ]; then
            export STATUS="pass"; export SUMMARY="PR opened"
          else
            export STATUS="fail"; export SUMMARY="build or PR step failed - see Actions log"
          fi
          PAYLOAD=$(node -e "process.stdout.write(JSON.stringify({status:process.env.STATUS,pr_url:process.env.PR_URL||null,branch:process.env.BRANCH,verdict_in:process.env.VERDICT_IN||null,summary:process.env.SUMMARY}))")
          echo "Reporting: $PAYLOAD"
          curl -sS -X POST "$COCKPIT_BASE/api/admin/pipeline/$SLUG/design-build/result" \
            -H 'Content-Type: application/json' \
            -d "$PAYLOAD"