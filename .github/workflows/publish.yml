name: Publish @caistech/* to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@caistech'
      - name: Install workspace deps
        run: npm ci
      # Build foundation packages first so downstream workspaces can resolve
      # their @caistech/* type imports (npm run --workspaces runs alphabetically
      # and does not honour the dependency graph — coordination-sdk imports
      # @caistech/nudge-core, agent-trust-score imports @caistech/security-gate).
      # TODO: migrate to turborepo / pnpm for topological builds once monorepo grows.
      - name: Build foundation packages first
        run: |
          # Leaf packages other workspaces import from. Extend this list
          # whenever a new package becomes a dependency of an earlier
          # alphabetical sibling — the npm --workspaces runner walks the
          # workspace map alphabetically, not topologically.
          npm run build --workspace=@caistech/nudge-core
          npm run build --workspace=@caistech/security-gate
          # @caistech/cais-au-compliance-mcp imports from cert-extractor + sanctions-screen
          npm run build --workspace=@caistech/cert-extractor
          npm run build --workspace=@caistech/sanctions-screen
          # @caistech/email-finder imports from hunter-email
          npm run build --workspace=@caistech/hunter-email
          # @caistech/corporate-components consumers (most products) import from it.
          # Building it early prevents downstream type-resolution issues if/when
          # another @caistech package adds it as a dep.
          npm run build --workspace=@caistech/corporate-components
          # @caistech/portfolio-gate is now consumed by portfolio-migrator's
          # default template; build it before migrator.
          npm run build --workspace=@caistech/portfolio-gate
      - name: Build all workspaces
        run: npm run build --workspaces --if-present
      # Per-workspace publish loop with "skip if already-published" check.
      # Needed for the bootstrap phase where we republish orphaned packages
      # one at a time — each tag after the first would otherwise fail on the
      # already-published packages. Halts on the first TRUE publish failure
      # (e.g. a not-yet-relinked orphan's 403), preserving per-round gating.
      - name: Publish workspaces (skip already-published)
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for manifest in packages/*/package.json; do
            pkg=$(node -p "require('./${manifest}').name")
            version=$(node -p "require('./${manifest}').version")
            is_private=$(node -p "require('./${manifest}').private || false")
            if [ "$is_private" = "true" ]; then
              echo "SKIP $pkg@$version (private)"
              continue
            fi
            if npm view "$pkg@$version" version --registry=https://npm.pkg.github.com > /dev/null 2>&1; then
              echo "SKIP $pkg@$version (already published)"
              continue
            fi
            echo "PUBLISH $pkg@$version"
            npm publish --workspace="$pkg" --access restricted
          done
