# Corporate AI Solutions — portfolio env-var manifest
#
# Single source of truth for which env vars MUST exist on each portfolio
# project's Vercel deploy target. Consumed by:
#   - @caistech/portfolio-env-sync (audit + apply)
#   - scripts/onboard-new-project.sh (new-project onboarding)
#   - scripts/set-caistech-token.sh (eventually — see Issue #4)
#
# v0 of portfolio-env-sync is audit-only and checks key NAMES per target,
# not values. `value: "TBD"` and `ref: "$secret:..."` are accepted but
# treated as opaque — they only become meaningful in v0.5+ (`--apply`).
#
# To run the audit:
#   export VERCEL_TOKEN=$(cat ~/.vercel-token)
#   node packages/portfolio-env-sync/dist/index.js --manifest portfolio-manifest.yaml

team_id: "team_hwN7IFtd2Fo3DCj9C67ZwI1t" # Corporate AI Solutions

# -----------------------------------------------------------------------------
# Secret resolution — maps $secret:NAME refs in shared/projects to their
# real source. Currently supports `from_supabase`. Future: from_env, from_op
# (1Password). Apply mode looks up these entries when it encounters a ref.
# -----------------------------------------------------------------------------
secrets:
  platform_trust_service_key:
    from_supabase:
      project_ref: "ggwveltavnvvscgqekhy"
      field: "service_role_key"

# -----------------------------------------------------------------------------
# Shared bindings — included via `inherit_shared:` in each project below.
# -----------------------------------------------------------------------------
shared:
  # Platform-trust shared infra (one Supabase project for trust events
  # across the whole portfolio).
  PLATFORM_TRUST_SUPABASE_URL: "https://ggwveltavnvvscgqekhy.supabase.co"
  PLATFORM_TRUST_SERVICE_KEY: { ref: "$secret:platform_trust_service_key" }

  # GH Packages PAT — needed for `npm install` of @caistech/* during build.
  # Propagated by scripts/set-caistech-token.sh.
  GITHUB_PACKAGES_TOKEN: { ref: "$secret:github_packages_token" }

  # Common LLM provider keys — present in most consumer apps.
  ANTHROPIC_API_KEY: { ref: "$secret:anthropic_api_key" }
  OPENAI_API_KEY: { ref: "$secret:openai_api_key" }

  # Property-services shared infra (one Supabase project + edge functions
  # for property intelligence across F2K, mmcbuild, deal-findrs).
  # As of 2026-04-30 the /derive and /assess functions are deployed
  # `--no-verify-jwt` and require an X-API-Key (issued per-consumer from
  # the property-services Supabase api_keys table). The anon key is kept
  # in shared for transition; new consumers should rely on apiKey only.
  NEXT_PUBLIC_PROPERTY_SERVICES_URL: "https://qppddipgixhinprliyxh.supabase.co"
  NEXT_PUBLIC_PROPERTY_SERVICES_ANON_KEY: { ref: "$secret:property_services_anon_key" }

# -----------------------------------------------------------------------------
# Projects currently managed by the @caistech hub workflow.
# Slugs match Vercel project names; inherit_shared lists which shared keys
# apply; envs declares project-specific bindings.
# -----------------------------------------------------------------------------
projects:

  - name: mmcbuild
    vercel_project_id: "prj_qKKLAkGGGVH5KocDfoGZQOqIZGvj"
    inherit_shared:
      - PLATFORM_TRUST_SUPABASE_URL
      - PLATFORM_TRUST_SERVICE_KEY
      - GITHUB_PACKAGES_TOKEN
      - ANTHROPIC_API_KEY
      - NEXT_PUBLIC_PROPERTY_SERVICES_URL
      - NEXT_PUBLIC_PROPERTY_SERVICES_ANON_KEY
    envs:
      PLATFORM_TRUST_PROJECT_ID: { ref: "$secret:platform_trust_project_id_mmcbuild" }
      NEXT_PUBLIC_SUPABASE_URL: { from_supabase: "url" }
      NEXT_PUBLIC_SUPABASE_ANON_KEY: { from_supabase: "anon_key" }
      SUPABASE_SERVICE_ROLE_KEY: { from_supabase: "service_role_key" }
      NEXT_PUBLIC_PROPERTY_SERVICES_API_KEY: { ref: "$secret:property_services_api_key_mmcbuild" }

  - name: deal-findrs
