# -----------------------------------------------------------------------------
# Product registry — per-product status + metadata fields.
#
# Added 2026-05-25 to back the "tracked in the manifest" / "manifest carries X"
# claims in the canonical docs (CLAUDE.md VOICE AI / TEAM ADMIN / SCAFFOLD
# METADATA rules; PRODUCT_STANDARDS §6/§7/§8; MONETISATION_RULES R15;
# BUSINESS_MODEL §3/§4). Keyed by the same `name:` used in `projects:` above.
# @caistech/portfolio-env-sync ignores this block (it only reads `projects:`).
#
# Status enums. `unaudited` is the visible-backlog sentinel — it means "not yet
# assessed", NOT a real classification. The quarterly portfolio review (and any
# session that touches a product's auth/chrome/voice/metadata) replaces it with
# a real value:
#   voice_agent_status:      present | absent | migrating | n/a-non-ui | unaudited
#   team_admin_status:       present | absent | n/a-single-user-by-design | n/a-non-ui | unaudited
#   metadata_status:         customized | scaffold-default | n/a-non-ui | unaudited
#   distributor_gate_status: validated | pending | no-go | personal-interest-override | n/a-infrastructure | unaudited
#
# Metadata fields consumed by scripts/customize-metadata.sh (App-/Pages-router
# aware). `display_name` is required and seeded below — DERIVED from the slug,
# so CONFIRM each is the real brand name. `tagline`, `description`,
# `canonical_url`, `og_image` are filled per-product before running the script;
# the script errors clearly if a required one is missing. See the SCAFFOLD
# METADATA rule for the exact metadata block written into layout.tsx.
# -----------------------------------------------------------------------------
