      PLATFORM_TRUST_PROJECT_ID: { ref: "$secret:platform_trust_project_id_hair_stylist_ai" }
      NEXT_PUBLIC_SUPABASE_URL: { from_supabase: "url" }
      NEXT_PUBLIC_SUPABASE_ANON_KEY: { from_supabase: "anon_key" }
      SUPABASE_SERVICE_ROLE_KEY: { from_supabase: "service_role_key" }
      NEXT_PUBLIC_APP_URL: "https://hair-stylist-ai-corporate-ai-solutions.vercel.app"
    auth_config:
      site_url: "https://hair-stylist-ai-corporate-ai-solutions.vercel.app"
      redirect_urls:
        - "https://hair-stylist-ai-corporate-ai-solutions.vercel.app/api/auth/c\
          allback"
        - "https://*-corporate-ai-solutions.vercel.app/api/auth/callback"
        - "http://localhost:3000/api/auth/callback"
      # Default of 2/hour was burning users on a 3rd magic-link retry.
      # 30/hour matches Supabase Pro defaults; safe ceiling for testing.
      rate_limit_email_sent: 30
      mailer_otp_exp: 3600
      mailer_otp_length: 8
      # Per-recipient cooldown in seconds. Default is 60, which makes
      # rapid magic-link retesting impossible (3 clicks → 2 throttled).
      # 1 = effectively no throttle; tighten to 30–60 for production.
      smtp_max_frequency: 1

