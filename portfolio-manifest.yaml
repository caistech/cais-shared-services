  corporate-ai-solutions:
    display_name: "Corporate AI Solutions" # marketing/marketplace + the methodology pipeline cockpit (/admin/methodology)
    tagline: "AI products, built by a one-operator factory" # draft — confirm
    description: "Corporate AI Solutions builds and validates AI products on a
      shared @caistech substrate, then runs the methodology pipeline that
      decides what to build next."
    canonical_url: "https://www.corporateaisolutions.com" # confirm — marketing domain, not a vercel alias
    voice_agent_status: absent # 2026-05-25 voice-audit: the "Talk to Morgan" FAB is a marketing MOCK (TODO-integrate, canned replies, local @/lib/elevenlabs), not a real agent; the Required in-context clarifier on Gate-1/Launch + the decision controls is being wired. See Corporate-AI-Solutions/voice-audit/2026-05-25/methodology-cockpit.md
    team_admin_status: n/a-single-operator # /admin cockpit is operator-only (auth-gated + ADMIN_EMAILS allowlist)
